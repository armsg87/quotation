<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ใบเสนอราคา AI - ระบบสมบูรณ์</title>
</head>
<body>
    <button id="aiBtn" onclick="generateQuotation()">สร้างใบเสนอราคาด้วย AI</button>
    <div id="resultTable"></div>

    <script>
        async function generateQuotation() {
            const btn = document.getElementById('aiBtn');
            const inputData = "รายการวัสดุที่ต้องการ..."; // เปลี่ยนเป็นดึงค่าจากช่องกรอกของคุณอาร์ม
            
            btn.disabled = true;
            btn.textContent = "กำลังสร้าง...";

            try {
                // เรียกใช้ Worker ของเรา (ตัวที่ Deploy เขียวแล้ว)
                const response = await fetch('https://dry-wave-d617.armsg87.workers.dev/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "claude-3-haiku-20240307",
                        max_tokens: 1024,
                        messages: [{ role: "user", content: "ถอดรายการวัสดุนี้ให้เป็นตาราง: " + inputData }]
                    })
                });

                if (!response.ok) throw new Error('Worker ปฏิเสธการเชื่อมต่อ');

                const data = await response.json();
                
                // แสดงผลในตาราง
                const resultText = data.content[0].text;
                document.getElementById('resultTable').innerHTML = resultText; 
                
                alert("สำเร็จ!");
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "สร้างใบเสนอราคาด้วย AI";
            }
        }
    </script>
</body>
</html>
