<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ใบเสนอราคา AI v9</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-4xl mx-auto bg-white p-6 shadow-md">
        <h1 class="text-2xl font-bold mb-4">ใบเสนอราคา</h1>
        <div id="quotation-content">
            <table class="w-full border-collapse border border-gray-300">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="border p-2">รายการ</th>
                        <th class="border p-2">จำนวน</th>
                        <th class="border p-2">ราคา</th>
                    </tr>
                </thead>
                <tbody id="items-tbody">
                    </tbody>
            </table>
        </div>
        <button onclick="generateWithAI()" class="mt-4 bg-orange-500 text-white p-2 rounded">✨ สร้างใบเสนอราคาด้วย AI</button>
    </div>

    <script>
        // โค้ดส่วนเชื่อมต่อ Cloudflare Worker ของคุณ
        async function generateWithAI() {
            const rawText = "รายการทดสอบ"; // สมมติค่าจาก textarea
            const response = await fetch('https://dry-wave-d617.armsg87.workers.dev/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "claude-3-haiku-20240307",
                    messages: [{ role: "user", content: "ถอดความรายการนี้เป็น JSON: " + rawText }]
                })
            });
            const data = await response.json();
            console.log(data);
            // แสดงผลลงตาราง
        }
    </script>
</body>
</html>
